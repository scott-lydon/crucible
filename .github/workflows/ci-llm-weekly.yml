name: CI (weekly LLM + slow)

# The opt-in real-LLM and slow tests (CRUCIBLE_RUN_LLM_TESTS / CRUCIBLE_RUN_SLOW_TESTS)
# are skipped by the per-push CI because they call the real model and retrain
# LightGBM on the full Kaggle dataset. This job runs them on a weekly cadence and
# on manual dispatch, fails loud on any regression, and uploads the run log as an
# artifact. The real-LLM tests need a Claude credential on the runner (the
# ANTHROPIC_API_KEY secret) and the slow tests need the creditcard.csv dataset;
# absent either, those tests skip honestly rather than passing vacuously, and the
# job still exercises the suite under both flags set.

on:
  schedule:
    # 07:00 UTC every Monday.
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  llm-and-slow-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: crucible
          POSTGRES_DB: crucible
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crucible"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://crucible:crucible@localhost:5432/crucible
      CRUCIBLE_TEST_DATABASE_URL: postgresql+asyncpg://crucible:crucible@localhost:5432/crucible_test
      CRUCIBLE_RUN_LLM_TESTS: "1"
      CRUCIBLE_RUN_SLOW_TESTS: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Pin Python 3.12
        run: uv python install 3.12

      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev,ml]"

      - name: Migrate test database
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://crucible:crucible@localhost:5432/crucible_test

      - name: Tests (LLM + slow flags set), tee to log
        run: |
          set -o pipefail
          uv run pytest -q 2>&1 | tee pytest-llm-weekly.log

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-llm-weekly-log
          path: pytest-llm-weekly.log
