[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crucible"
version = "0.1.0"
description = "Crucible — adversarial verification platform for the Integrity pillar (catch silently-wrong AI outputs)."
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sse-starlette",
    "pydantic>=2",
    "sqlalchemy[asyncio]>=2",
    "asyncpg",
    "alembic",
    "anthropic",
    "httpx",
    "structlog",
    "lightgbm",
    "scikit-learn",
    "scipy",
    "numpy",
    "pandas",
    "hypothesis",
    "pyyaml",
    "reportlab",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "pytest-cov", "ruff", "mypy", "types-PyYAML"]

[project.scripts]
crucible = "orchestrator.cli:main"

[tool.setuptools.packages.find]
include = ["shared*", "orchestrator*", "modules*"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM", "RUF", "BLE", "N"]
ignore = ["B008"]  # FastAPI Depends() in defaults is idiomatic

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]

# Third-party libraries without type stubs. Not a `# type: ignore` in code paths;
# constitution section 1 permits silencing import-only stub gaps here.
[[tool.mypy.overrides]]
module = [
    "lightgbm.*",
    "sklearn.*",
    "scipy.*",
    "pandas.*",
    "reportlab.*",
    "sse_starlette.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "modules"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["shared", "orchestrator", "modules"]
omit = ["*/tests/*", "*/__init__.py"]
