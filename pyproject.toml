[project]
name = "crucible"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
  "anthropic>=0.69",
  "python-dotenv>=1.0",
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
  "sqlalchemy[asyncio]>=2.0",
  "aiosqlite>=0.20",
  "pydantic>=2.6",
  "structlog>=24.1",
  "pyyaml>=6",
  "scikit-learn>=1.4",
  "lightgbm>=4.0",
  "joblib>=1.3",
  "pandas>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "httpx>=0.27", "ruff>=0.4", "mypy>=1.10", "coverage>=7.5", "types-PyYAML"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "modules", "shared", "orchestrator"]
markers = [
  "docker: integration tests that require a running Docker daemon",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["scratchpad", ".venv"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = []
exclude = ["scratchpad/", "\\.venv/"]

# Untyped third-party libs (no stubs / py.typed). Scoped overrides keep
# --strict in force for our own code while tolerating missing stubs here.
[[tool.mypy.overrides]]
module = ["joblib.*", "sklearn.*", "lightgbm.*", "pandas.*"]
ignore_missing_imports = true

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["shared", "orchestrator", "modules"]
