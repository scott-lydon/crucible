[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "crucible-redteam"
version = "0.1.0"
description = "Automated AI red-team: break your own AI agent, harden it, and prove the fix held."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Julian Stancioff" }]
keywords = ["ai", "security", "red-team", "prompt-injection", "llm", "agents"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Security",
]
dependencies = []  # core is stdlib-only by design (runs offline, no deps)

[project.optional-dependencies]
anthropic = ["anthropic>=0.39"]
browser = ["playwright>=1.40", "browser-use>=0.1"]
dev = ["pytest>=7", "ruff>=0.5"]

[project.scripts]
crucible = "crucible.cli:main"

[project.urls]
Homepage = "https://github.com/scott-lydon/crucible"
Issues = "https://github.com/scott-lydon/crucible/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"
