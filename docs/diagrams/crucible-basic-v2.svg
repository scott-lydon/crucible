<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.00 0.00 920.00 871.00" role="img" aria-labelledby="t d">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e2e8f0" /></marker><style>
  /* Box fills are pale pastels; text is solid #0d0d0d for maximum legibility
     regardless of the host theme (light or dark). We do NOT use the
     --text-primary CSS variable here because in a dark theme it can resolve
     to a near-white that then sits on top of a near-white pastel fill and
     becomes unreadable. The pastels are constants, so the text color can be
     a constant too. */
  .box        { fill: var(--bg-200, #f3f3f0); stroke: var(--border, #d6d3cf); stroke-width: 1.2; }
  .accent     { fill: var(--accent-100, #e8e6e1); stroke: var(--border, #a59f96); stroke-width: 2.0; }
  .tier-data         { fill: #dde7f0; stroke: #6b8aab; }
  .tier-compute      { fill: #e0ecd9; stroke: #75986a; }
  .tier-control      { fill: #ecdff0; stroke: #9b6fa7; }
  .tier-observability{ fill: #f5dcdc; stroke: #a96f6f; }
  .tier-storage      { fill: #f5ecd0; stroke: #a98947; }
  .tier-parallel     { fill: #dde7f0; stroke: #6b8aab; }
  .tier-kernel       { fill: #e0ecd9; stroke: #75986a; }
  .tier-decode       { fill: #ecdff0; stroke: #9b6fa7; }
  .tier-output       { fill: #f5ecd0; stroke: #a98947; }
  /* Foundational nodes — present in the Basic Interview Sketch (the simplest
     diagram that would pass 90% of technical interviews) AND echoed in
     exhaustive diagrams. The accent border + outer drop-shadow glow lets a
     reader sweeping the deep-dive diagrams instantly see which boxes carry
     the whiteboard answer and which are extra-credit material. The selectors
     below have higher specificity than the .tier-* rules above (class.class
     beats single class), so they win on stroke. The filter is applied at the
     node-level &lt;g&gt; so the glow sits behind the box and its text. */
  .node.foundational &gt; path,
  .node.foundational &gt; polygon,
  .node.foundational &gt; ellipse,
  .node.foundational &gt; rect {
    stroke: #c2410c;
    stroke-width: 3.2;
  }
  .node.foundational {
    filter: drop-shadow(0 0 3px rgba(194, 65, 12, 0.55));
  }
  /* Solid dark text for legibility on pastel fills. Accent ellipses get an
     extra weight + size bump because their text otherwise looks small inside
     a large oval. */
  .node text         { fill: #0d0d0d; font: 700 13px system-ui, sans-serif; }
  .node.accent text  { fill: #0d0d0d; font: 800 14px system-ui, sans-serif; letter-spacing: 0.1px; }
  /* High-contrast edges that read on BOTH dark and light backgrounds.
     The previous edge stroke (#4a4a48) disappeared on dark themes because
     the chat surface is near-black. A bright slate stroke (#e2e8f0) at width
     2.2, with a matching arrowhead fill and labels carrying a dark halo via
     paint-order: stroke, is visible on dark backgrounds and still readable
     on top of the pale pastel box fills in light mode. The marker fill in
     style_svg below was bumped to the same #e2e8f0 for the same reason. */
  .edge path, .edge polyline {
    fill: none; stroke: #e2e8f0; stroke-width: 2.2;
  }
  .edge polygon { fill: #e2e8f0; stroke: #e2e8f0; }
  .edge-ctrl path, .edge-ctrl polyline {
    fill: none; stroke: #e2e8f0; stroke-width: 2.0;
    stroke-dasharray: 6 4;
  }
  .edge-ctrl polygon { fill: #e2e8f0; stroke: #e2e8f0; }
  .edge text, .edge-ctrl text {
    fill: #f1f5f9; font: 700 12px system-ui, sans-serif;
    paint-order: stroke; stroke: rgba(15, 23, 42, 0.85); stroke-width: 3px;
  }
</style></defs><title id="t">Crucible · closed loop, 8 foundational nodes</title><desc id="d">Cycle topology: red attacks, target outputs, oracles vote, aggregator decides, catalog records, blue patches, measure scores, halt-cert gates. Burnt-orange border marks whiteboard-pass-bar nodes.</desc><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(50.4 820.44)">
