# Local Postgres 16 for Crucible runtime/dev.
#   docker compose up -d postgres
# App default URL (orchestrator/db.py): override with CRUCIBLE_DATABASE_URL.
#   postgresql+asyncpg://crucible:crucible@localhost:5432/crucible_dev
# Dev creds only — never used in prod (prod URL comes from the host env).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: crucible
      POSTGRES_PASSWORD: crucible
      POSTGRES_DB: crucible_dev
    ports:
      - "5432:5432"
    volumes:
      - crucible_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crucible -d crucible_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  crucible_pgdata:
