# SealedSpec for the REAL Sparkov fraud victim (slice-2).
# Declares — as DATA — what the detector must satisfy over the interpretable
# features derived from the real dataset. The declared ground-truth rule lives
# in rule.py (is_fraud); the invariant + metamorphic relation below are the
# machine-checkable obligations the oracles evaluate.
target_kind: fraud

obligations:
  - "flag transactions that are truly fraudulent (night-hour, or high-amount in a risky category)"
  - "do not be fooled by amount-only evasion on night-driven frauds"

invariants:
  # A subset of the declared rule that the must_flag_when/all_of grammar can
  # express exactly: a high-amount transaction in a risky category is fraud and
  # must be flagged regardless of any other feature. Fires if such a txn is
  # cleared.
  - name: risky_category_high_amount_must_flag
    description: >-
      A transaction in a risky category (cat_risk == 1) with amount above 250
      must be flagged by the detector. Fires when such a transaction is cleared.
    kind: must_flag_when
    params:
      all_of:
        - feature: cat_risk
          eq: 1
        - feature: amt
          gt: 250

metamorphic_relations:
  # Lowering the amount alone must not change the true fraud label: night-driven
  # frauds stay fraud at any amount. This is the relation the evasion adversary
  # exploits against the amount-reliant flawed detector.
  - name: amt_decrease_label_invariance
    description: >-
      Lowering the transaction amount must not change the true fraud label. A
      night-hour fraud remains fraudulent when its amount is reduced.
    feature: amt
    direction: decrease
    label_must_change: false

holdout_generator_kind: deterministic_real_sample
