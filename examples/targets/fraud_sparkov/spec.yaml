# SealedSpec for the REAL Sparkov fraud victim (Part B1: multi-signal rework).
# Declares — as DATA — what the detector must satisfy over the rich, multi-signal
# features derived from the real dataset. Ground truth is now the strong
# multi-signal REFERENCE model (reference_model.reference_is_fraud), NOT a
# night-hour rule. The invariant + metamorphic relation below are the
# machine-checkable obligations the oracles evaluate.
#
# The deployed victim uses the static/contextual signals
# (amt, cat_risk, merchant_risk, age, city_pop) but is BLIND to the
# behavioral/temporal/geo signals (velocity, day_of_week, geo_distance_km) — a
# plausible feature-engineering gap, not a 2-feature toy. The reference model and
# the cross-family second model both SEE those signals, so they credibly judge
# transactions the victim mishandles.
target_kind: fraud

obligations:
  - "flag transactions that are truly fraudulent (per the multi-signal reference model)"
  - "do not be fooled by amount-only evasion that preserves the true fraud label"

invariants:
  # A hard rule the must_flag_when/all_of grammar can express exactly: a
  # high-amount transaction in a risky category is fraud and must be flagged.
  # Fires if such a transaction is cleared by the detector.
  - name: risky_category_high_amount_must_flag
    description: >-
      A transaction in a risky category (cat_risk == 1) with amount above 250
      must be flagged by the detector. Fires when such a transaction is cleared.
    kind: must_flag_when
    params:
      all_of:
        - feature: cat_risk
          eq: 1
        - feature: amt
          gt: 250

metamorphic_relations:
  # Lowering the amount alone must not change the true fraud label: a transaction
  # whose fraud signal comes from non-amount axes (behavioral/temporal/geo, or
  # per-merchant risk) stays fraud when its amount is reduced. This is one HINT
  # the metamorphic oracle checks (R1) — it is NOT the red's only move. The red
  # is FREE and MULTI-FEATURE: it may lower/adjust ANY victim-visible feature
  # (amt, cat_risk, merchant_risk, age, city_pop) and COMBINE them; the strong
  # multi-signal reference model judges whether the true fraud label is preserved
  # on every proposal, so no single axis is hard-declared to the adversary.
  - name: amt_decrease_label_invariance
    description: >-
      Lowering the transaction amount must not change the true fraud label. A
      transaction fraudulent on non-amount signals remains fraudulent when its
      amount is reduced.
    feature: amt
    direction: decrease
    label_must_change: false

holdout_generator_kind: deterministic_real_sample
