<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crucible — stress-test any AI agent</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%E2%AC%A2%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --base:#0E141B; --surface:#161E27; --surface2:#1D2630; --surface3:#25303C;
    --border:#2C3744; --border-strong:#3A4654;
    --hi:#E8EDF3; --text:#B8C2CE; --mut:#7C8896;
    --primary:#4FAAC0; --primary-dim:#316E7E;
    --success:#57C08A; --danger:#E5736B; --warning:#D9A441;
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--base);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
  a{color:var(--primary);text-decoration:none} a:hover{text-decoration:underline}
  h1,h2,h3{color:var(--hi);font-weight:600;margin:0}
  code,.mono{font-family:var(--mono)}
  header.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:18px;
    padding:0 22px;height:54px;background:var(--surface);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--hi);font-size:15px}
  .brand .hex{color:var(--primary);font-size:18px}
  nav.tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
  nav.tabs a{padding:8px 13px;border-radius:7px;color:var(--mut);font-weight:500;white-space:nowrap;font-size:13px}
  nav.tabs a:hover{background:var(--surface2);color:var(--text);text-decoration:none}
  nav.tabs a.active{background:var(--surface3);color:var(--hi)}
  .budget-chip{font-family:var(--mono);font-size:12px;color:var(--mut);white-space:nowrap;
    border:1px solid var(--border);border-radius:7px;padding:6px 10px}
  .budget-chip b{color:var(--hi)}
  main{max-width:1180px;margin:0 auto;padding:28px 22px 80px}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
  .card h2{font-size:15px;margin-bottom:14px}
  .card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .muted{color:var(--mut)} .hi{color:var(--hi)}
  .label{color:var(--mut);font-size:11px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;display:block}
  label.field{display:block;margin-bottom:16px}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--hi);padding:10px 12px;font-family:var(--sans);font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--border-strong)}
  textarea{resize:vertical;font-family:var(--mono);font-size:13px}
  .inline{display:flex;gap:14px;flex-wrap:wrap}.inline>label.field{flex:1;min-width:120px;margin-bottom:0}
  button.btn{background:var(--primary);color:#06121A;border:0;border-radius:8px;padding:11px 20px;font-weight:600;font-size:14px;cursor:pointer}
  button.btn:hover{filter:brightness(1.08)} button.btn:disabled{opacity:.55;cursor:default}
  button.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--mut);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
  tr:last-child td{border-bottom:0} tr.clickable{cursor:pointer} tr.clickable:hover td{background:var(--surface2)}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono)}
  .pill.green{background:rgba(87,192,138,.15);color:var(--success)}
  .pill.red{background:rgba(229,115,107,.15);color:var(--danger)}
  .pill.amber{background:rgba(217,164,65,.15);color:var(--warning)}
  .pill.grey{background:var(--surface3);color:var(--mut)}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;vertical-align:middle}
  .bar{display:inline-block;width:90px;height:7px;border-radius:4px;background:var(--surface3);vertical-align:middle;overflow:hidden}
  .bar>i{display:block;height:7px;border-radius:4px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .tile{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}
  .tile .v{font-size:24px;color:var(--hi);font-weight:600;font-family:var(--mono)}
  .stream{font-family:var(--mono);font-size:12px}
  pre.prompt{white-space:pre-wrap;background:var(--base);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--hi);font-size:12px;max-height:360px;overflow:auto}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border-strong);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{color:var(--mut);padding:18px 0;text-align:center}
  mark.leak{background:rgba(229,115,107,.28);color:#ffdad4;padding:0 3px;border-radius:3px;font-weight:600}
  tr.row-caught td{background:rgba(229,115,107,.06)}
  tr.row-caught.clickable:hover td{background:rgba(229,115,107,.12)}
  .leak-banner{display:flex;gap:10px;align-items:flex-start;background:rgba(229,115,107,.10);
    border:1px solid rgba(229,115,107,.35);border-radius:10px;padding:12px 14px;margin-bottom:16px}
  .leak-banner .lb-mark{color:var(--danger);font-size:18px;line-height:1.2}
  .walk{display:flex;flex-direction:column;gap:10px}
  .walk a{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:12px 14px;color:var(--text)}
  .walk a:hover{border-color:var(--border-strong);text-decoration:none;background:var(--surface3)}
  .walk .n{flex:none;width:26px;height:26px;border-radius:50%;background:var(--primary);color:#06121A;
    font-weight:700;font-family:var(--mono);display:flex;align-items:center;justify-content:center;font-size:13px}
  .walk .wt{font-weight:600;color:var(--hi)} .walk .wd{color:var(--mut);font-size:12px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="hex">⬢</span> Crucible</div>
  <nav class="tabs" id="tabs"></nav>
  <a class="budget-chip" id="budget-chip" href="#/admin">budget —</a>
</header>
<main id="view"><div class="empty"><span class="spinner"></span> loading…</div></main>
<script src="app.js"></script>
</body>
</html>
