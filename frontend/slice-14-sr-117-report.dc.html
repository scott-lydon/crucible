<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#F5F2EC;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;color:#1A2330}
  @media print {
    body{background:#fff}
    .no-print{display:none !important}
    .page{box-shadow:none !important;margin:0 !important;page-break-after:always}
  }
</style>
</helmet>

<div data-screen-label="SR 11-7 Report · acme-fraud" style="min-height:100vh;background:#F5F2EC;color:#1A2330;font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;line-height:1.6">

  <!-- floating chrome (hidden on print) -->
  <div class="no-print" style="position:sticky;top:0;z-index:40;background:#1A2330;border-bottom:1px solid #2C3744;color:#E8EDF3">
    <div style="display:flex;align-items:center;gap:16px;padding:12px 22px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:12px">
      <span style="font-weight:600">Crucible · SR 11-7 export preview</span>
      <span style="color:#B8C2CE">SR 11-7 model risk report</span>
      <div style="flex:1"></div>
      <button style="background:#4FAAC0;color:#0E141B;border:0;font:inherit;font-weight:600;padding:7px 14px;border-radius:5px;cursor:pointer">print / save PDF</button>
      <a href="#" title="downloads the report PDF" style="color:#4FAAC0;text-decoration:none">download .pdf</a>
      <a href="#" title="report manifest with signatures + hash chain" style="color:#4FAAC0;text-decoration:none">manifest.json</a>
    </div>
  </div>

  <!-- printable page -->
  <div class="page" style="max-width:880px;margin:24px auto;background:#FFFFFF;padding:60px 64px 80px;box-shadow:0 2px 14px rgba(0,0,0,.06);border:1px solid #E0DBD2">
    <div data-live="report" style="white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1A2330">no run selected</div>
  
  </div>
</div>
</x-dc>
