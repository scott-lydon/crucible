# Local Postgres 16 for development and the integration test suite.
# `docker compose up -d` then `uv run alembic upgrade head` and a fresh
# checkout runs the whole suite. SQLite is never used (coding-practices.md).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: crucible
      POSTGRES_PASSWORD: crucible
      POSTGRES_DB: crucible
    # Host port is configurable so a machine that already runs Postgres on
    # 5432 can map Crucible somewhere free. Set CRUCIBLE_DB_PORT in .env.
    ports:
      - "${CRUCIBLE_DB_PORT:-5432}:5432"
    volumes:
      - crucible_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crucible"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crucible_pgdata:
